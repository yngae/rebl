<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATX Roblox Checker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e1a;
            color: #c8d0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid #1a2340;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #4a5a7a; font-size: 0.9em; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card {
            background: #111827;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #1a2340;
        }
        .card h3 {
            color: #8a9aba;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            border-bottom: 1px solid #1a2340;
            padding-bottom: 10px;
        }
        .full-width { grid-column: 1 / -1; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block;
            color: #4a5a7a;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
        }
        .form-group textarea, .form-group input {
            width: 100%;
            padding: 10px;
            background: #0a0e1a;
            border: 1px solid #1a2340;
            border-radius: 6px;
            color: #c8d0e0;
            font-size: 0.95em;
            font-family: 'Courier New', monospace;
        }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-group textarea:focus, .form-group input:focus {
            outline: none;
            border-color: #4a5a8a;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #5a6adf, #6a3a9a);
            color: white;
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(90,106,223,0.3); }
        .btn-danger { background: #b02a3a; color: white; }
        .btn-danger:hover:not(:disabled) { background: #c02a3a; }
        .btn-secondary { background: #1a2340; color: #6a7b9c; }
        .btn-secondary:hover:not(:disabled) { background: #25305a; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .stat-item {
            background: #0a0e1a;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #111827;
        }
        .stat-item .stat-value {
            font-size: 1.3em;
            font-weight: 700;
            color: #4a5a7a;
        }
        .stat-item .stat-label {
            font-size: 0.65em;
            color: #3a4a6a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }
        .stat-item.hit .stat-value { color: #4ade80; }
        .stat-item.premium .stat-value { color: #fbbf24; }
        .stat-item.robux .stat-value { color: #34d399; }
        .stat-item.high-value .stat-value { color: #f472b6; }
        
        .status-bar {
            background: #0a0e1a;
            padding: 10px 14px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #111827;
        }
        .status-indicator { display: flex; align-items: center; gap: 10px; }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.running { background: #4ade80; animation: pulse 1.5s infinite; }
        .status-dot.stopped { background: #4a2a3a; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .progress-bar {
            width: 100%;
            height: 3px;
            background: #0a0e1a;
            border-radius: 2px;
            overflow: hidden;
            margin: 8px 0;
        }
        .progress-bar .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #5a6adf, #764ba2);
            transition: width 0.5s ease;
        }
        .progress-text { font-size: 0.75em; color: #3a4a6a; }
        
        .result-box {
            background: #0a0e1a;
            border-radius: 6px;
            padding: 10px 12px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
            line-height: 1.6;
            border: 1px solid #111827;
        }
        .result-box::-webkit-scrollbar { width: 5px; }
        .result-box::-webkit-scrollbar-track { background: #0a0e1a; }
        .result-box::-webkit-scrollbar-thumb { background: #1a2340; border-radius: 3px; }
        
        .result-line {
            padding: 2px 6px;
            border-radius: 3px;
            margin-bottom: 1px;
            white-space: pre-wrap;
            word-break: break-all;
            color: #4a5a7a;
        }
        .result-line.hit { color: #4ade80; font-weight: bold; }
        .result-line.premium { color: #fbbf24; }
        .result-line.error { color: #f87171; }
        .result-line.info { color: #60a5fa; }
        .result-line.success { color: #34d399; }
        .result-line.warning { color: #fbbf24; }
        .result-line.muted { color: #2a3a5a; }
        .result-line.detail { color: #6a7b9c; padding-left: 20px; }
        
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 1.5em; }
        }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .loading-overlay.active { display: flex; }
        .loading-content {
            background: #111827;
            padding: 30px 40px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #1a2340;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #1a2340;
            border-top: 3px solid #5a6adf;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-content h3 { color: #c8d0e0; }
        .loading-content p { color: #3a4a6a; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ATX Roblox Checker</h1>
            <p>Headless account verification - Results shown in real-time</p>
        </div>
        
        <div class="grid">
            <div class="card full-width">
                <h3>Configuration</h3>
                <form id="configForm">
                    <div class="form-group">
                        <label>Accounts (username:password)</label>
                        <textarea id="comboContent" placeholder="username1:password1&#10;username2:password2" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Proxies (optional)</label>
                        <textarea id="proxyContent" placeholder="http://proxy1:port&#10;http://proxy2:port" style="min-height: 50px;"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Threads</label>
                            <input type="number" id="threads" value="1" min="1" max="5">
                        </div>
                        <div class="form-group">
                            <label>Delay (seconds)</label>
                            <input type="number" id="delay" value="3" min="1" step="0.5">
                        </div>
                    </div>
                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary" id="startBtn">Start Checking</button>
                        <button type="button" class="btn btn-danger" id="stopBtn" disabled>Stop</button>
                        <button type="button" class="btn btn-secondary" id="clearBtn">Clear Results</button>
                    </div>
                </form>
            </div>
            
            <div class="card">
                <h3>Status</h3>
                <div class="status-bar">
                    <div class="status-indicator">
                        <span class="status-dot stopped" id="statusDot"></span>
                        <span class="status-text" id="statusText" style="font-size:0.85em;">Stopped</span>
                    </div>
                    <span class="progress-text" id="progressText">0 / 0</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="stats-grid">
                    <div class="stat-item hit">
                        <div class="stat-value" id="hits">0</div>
                        <div class="stat-label">Valid</div>
                    </div>
                    <div class="stat-item premium">
                        <div class="stat-value" id="premium">0</div>
                        <div class="stat-label">Premium</div>
                    </div>
                    <div class="stat-item robux">
                        <div class="stat-value" id="robux">0</div>
                        <div class="stat-label">Robux</div>
                    </div>
                    <div class="stat-item high-value">
                        <div class="stat-value" id="highValue">0</div>
                        <div class="stat-label">High Value</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h3>Results <span style="font-size:0.7em;color:#3a4a6a;font-weight:normal;" id="resultCount">(0)</span></h3>
                <div class="result-box" id="resultBox">
                    <div class="result-line muted">Waiting for results...</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <h3>Processing</h3>
            <p id="loadingText">Checking accounts...</p>
        </div>
    </div>

    <script>
        let updateInterval = null;
        let resultHistory = [];
        
        function addResult(text, type = 'info') {
            const box = document.getElementById('resultBox');
            const div = document.createElement('div');
            div.className = `result-line ${type}`;
            div.textContent = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            resultHistory.push({ text, type });
            document.getElementById('resultCount').textContent = `(${resultHistory.length})`;
            
            if (resultHistory.length > 200) {
                resultHistory.shift();
                if (box.children.length > 200) {
                    box.removeChild(box.firstChild);
                }
            }
        }
        
        function clearResults() {
            const box = document.getElementById('resultBox');
            box.innerHTML = '';
            resultHistory = [];
            document.getElementById('resultCount').textContent = '(0)';
            addResult('Results cleared', 'muted');
        }
        
        async function loadStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                const status = data.status;
                const isRunning = data.is_running;
                
                const dot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');
                
                if (isRunning) {
                    dot.className = 'status-dot running';
                    statusText.textContent = 'Running';
                    statusText.style.color = '#4ade80';
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('stopBtn').disabled = false;
                    document.getElementById('loadingOverlay').classList.add('active');
                    document.getElementById('loadingText').textContent = `${status.verified}/${status.total}`;
                } else {
                    dot.className = 'status-dot stopped';
                    statusText.textContent = 'Stopped';
                    statusText.style.color = '#4a5a7a';
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('stopBtn').disabled = true;
                    document.getElementById('loadingOverlay').classList.remove('active');
                }
                
                document.getElementById('hits').textContent = status.valid || 0;
                document.getElementById('premium').textContent = status.premium_accounts || 0;
                document.getElementById('robux').textContent = (status.total_robux || 0).toLocaleString();
                document.getElementById('highValue').textContent = status.high_value_accounts || 0;
                
                const total = status.total || 1;
                const verified = status.verified || 0;
                const progress = total > 0 ? (verified / total) * 100 : 0;
                document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
                document.getElementById('progressText').textContent = `${verified} / ${total}`;
                
                // Add web results if available
                if (status.web_results && status.web_results.length > 0) {
                    const existingTexts = resultHistory.map(r => r.text);
                    for (const result of status.web_results) {
                        if (!existingTexts.some(r => r.includes(result.substring(0, 20)))) {
                            let type = 'info';
                            if (result.includes('[HIT]')) type = 'hit';
                            else if (result.includes('[PREMIUM]')) type = 'premium';
                            else if (result.includes('[WRONG]')) type = 'error';
                            else if (result.includes('[ERROR]')) type = 'error';
                            else if (result.includes('[TIMEOUT]')) type = 'warning';
                            else if (result.includes('[CAPTCHA]')) type = 'warning';
                            else if (result.includes('---')) type = 'detail';
                            addResult(result, type);
                        }
                    }
                }
            } catch (error) {
                console.error('Status error:', error);
            }
        }
        
        document.getElementById('configForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const comboContent = document.getElementById('comboContent').value.trim();
            if (!comboContent) {
                addResult('Error: Enter at least one account', 'error');
                return;
            }
            
            const lines = comboContent.split('\n').filter(line => line.trim());
            addResult(`Starting check for ${lines.length} account(s)`, 'info');
            
            const config = {
                combo_content: comboContent,
                proxy_content: document.getElementById('proxyContent').value.trim(),
                threads: parseInt(document.getElementById('threads').value) || 1,
                min_delay: parseFloat(document.getElementById('delay').value) || 3,
                max_delay: parseFloat(document.getElementById('delay').value) || 3
            };
            
            try {
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    addResult(`Checker started (${data.total_accounts} accounts)`, 'success');
                    if (updateInterval) clearInterval(updateInterval);
                    updateInterval = setInterval(loadStatus, 1500);
                    loadStatus();
                } else {
                    addResult(`Error: ${data.error}`, 'error');
                }
            } catch (error) {
                addResult(`Error: ${error.message}`, 'error');
            }
        });
        
        document.getElementById('stopBtn').addEventListener('click', async () => {
            if (!confirm('Stop checker?')) return;
            try {
                const response = await fetch('/api/stop', { method: 'POST' });
                const data = await response.json();
                if (response.ok) {
                    addResult('Checker stopped', 'warning');
                    loadStatus();
                } else {
                    addResult(`Error: ${data.error}`, 'error');
                }
            } catch (error) {
                addResult(`Error: ${error.message}`, 'error');
            }
        });
        
        document.getElementById('clearBtn').addEventListener('click', clearResults);
        
        loadStatus();
        setInterval(loadStatus, 3000);
    </script>
</body>
</html>
