<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATX Roblox Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0e1a;
            color: #c8d0e0;
            min-height: 100vh;
            padding: 24px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 24px 20px 30px;
            margin-bottom: 32px;
            border-bottom: 1px solid #1a2340;
        }
        
        .header h1 {
            font-size: 2.2em;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        
        .header .subtitle {
            color: #6a7b9c;
            font-size: 0.95em;
            font-weight: 400;
        }
        
        .header .version {
            color: #3a4a6a;
            font-size: 0.8em;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: #111827;
            border-radius: 10px;
            padding: 22px;
            border: 1px solid #1a2340;
            transition: border-color 0.2s;
        }
        
        .card:hover {
            border-color: #25305a;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #1a2340;
        }
        
        .card-header h3 {
            color: #a8b8d8;
            font-size: 1em;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            font-size: 0.85em;
        }
        
        .card-header .badge-count {
            background: #1a2340;
            color: #6a7b9c;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75em;
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        .form-group {
            margin-bottom: 14px;
        }
        
        .form-group label {
            display: block;
            color: #6a7b9c;
            margin-bottom: 4px;
            font-size: 0.82em;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        
        .form-group textarea,
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: #0a0e1a;
            border: 1px solid #1a2340;
            border-radius: 6px;
            color: #c8d0e0;
            font-size: 0.95em;
            transition: border-color 0.2s, background 0.2s;
            font-family: 'SF Mono', 'Courier New', monospace;
        }
        
        .form-group textarea:focus,
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4a5a8a;
            background: #0d1225;
        }
        
        .form-group textarea {
            min-height: 110px;
            resize: vertical;
            line-height: 1.5;
        }
        
        .form-group textarea::placeholder,
        .form-group input::placeholder {
            color: #2a3a5a;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }
        
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 0.3px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #5a6adf, #6a3a9a);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(90, 106, 223, 0.3);
        }
        
        .btn-danger {
            background: #b02a3a;
            color: white;
        }
        
        .btn-danger:hover:not(:disabled) {
            background: #c02a3a;
            transform: translateY(-1px);
        }
        
        .btn-success {
            background: #1a7a3a;
            color: white;
        }
        
        .btn-success:hover:not(:disabled) {
            background: #1a8a3a;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: #1a2340;
            color: #8a9aba;
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: #25305a;
        }
        
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 12px;
        }
        
        .stat-item {
            background: #0a0e1a;
            padding: 10px 8px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #111827;
        }
        
        .stat-item .stat-value {
            font-size: 1.4em;
            font-weight: 700;
            color: #6a7b9c;
            font-variant-numeric: tabular-nums;
        }
        
        .stat-item .stat-label {
            font-size: 0.7em;
            color: #4a5a7a;
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-item.hit .stat-value {
            color: #4ade80;
        }
        
        .stat-item.premium .stat-value {
            color: #fbbf24;
        }
        
        .stat-item.robux .stat-value {
            color: #34d399;
        }
        
        .stat-item.high-value .stat-value {
            color: #f472b6;
        }
        
        .status-bar {
            background: #0a0e1a;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            border: 1px solid #111827;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        
        .status-dot.running {
            background: #4ade80;
            animation: pulse 1.5s infinite;
        }
        
        .status-dot.stopped {
            background: #6a3a4a;
        }
        
        .status-dot.error {
            background: #f87171;
        }
        
        .status-text {
            font-size: 0.9em;
            font-weight: 500;
            color: #8a9aba;
        }
        
        .status-text.running {
            color: #4ade80;
        }
        
        .status-text.stopped {
            color: #6a7b9c;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #0a0e1a;
            border-radius: 2px;
            overflow: hidden;
            margin: 8px 0 4px;
        }
        
        .progress-bar .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #5a6adf, #764ba2);
            transition: width 0.5s ease;
            border-radius: 2px;
        }
        
        .progress-text {
            font-size: 0.8em;
            color: #4a5a7a;
            font-variant-numeric: tabular-nums;
        }
        
        .result-box {
            background: #0a0e1a;
            border-radius: 6px;
            padding: 12px;
            max-height: 380px;
            overflow-y: auto;
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 0.82em;
            line-height: 1.6;
            border: 1px solid #111827;
        }
        
        .result-box::-webkit-scrollbar {
            width: 6px;
        }
        
        .result-box::-webkit-scrollbar-track {
            background: #0a0e1a;
        }
        
        .result-box::-webkit-scrollbar-thumb {
            background: #1a2340;
            border-radius: 3px;
        }
        
        .result-box::-webkit-scrollbar-thumb:hover {
            background: #25305a;
        }
        
        .result-line {
            padding: 3px 6px;
            border-radius: 3px;
            margin-bottom: 1px;
            white-space: pre-wrap;
            word-break: break-all;
            color: #6a7b9c;
        }
        
        .result-line.hit {
            color: #4ade80;
        }
        
        .result-line.premium {
            color: #fbbf24;
        }
        
        .result-line.error {
            color: #f87171;
        }
        
        .result-line.info {
            color: #60a5fa;
        }
        
        .result-line.success {
            color: #34d399;
        }
        
        .result-line.warning {
            color: #fbbf24;
        }
        
        .result-line.muted {
            color: #3a4a6a;
        }
        
        .badge {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 3px;
            font-size: 0.7em;
            font-weight: 600;
            margin-left: 4px;
            letter-spacing: 0.3px;
        }
        
        .badge-premium {
            background: #7a5a1a;
            color: #fbbf24;
        }
        
        .badge-hit {
            background: #1a4a2a;
            color: #4ade80;
        }
        
        .badge-robux {
            background: #1a4a4a;
            color: #34d399;
        }
        
        .badge-banned {
            background: #4a1a1a;
            color: #f87171;
        }
        
        .file-list {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        
        .file-item {
            background: #0a0e1a;
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid #1a2340;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85em;
        }
        
        .file-item .file-name {
            color: #8a9aba;
        }
        
        .file-item .file-size {
            color: #3a4a6a;
            font-size: 0.8em;
        }
        
        .btn-sm {
            padding: 3px 12px;
            font-size: 0.75em;
        }
        
        @media (max-width: 768px) {
            body { padding: 12px; }
            .grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.6em; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .card { padding: 16px; }
        }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .loading-content {
            background: #111827;
            padding: 32px 40px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #1a2340;
            max-width: 400px;
        }
        
        .loading-content h3 {
            color: #c8d0e0;
            font-weight: 500;
            margin-bottom: 6px;
        }
        
        .loading-content p {
            color: #4a5a7a;
            font-size: 0.9em;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1a2340;
            border-top: 3px solid #5a6adf;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .divider {
            border: none;
            border-top: 1px solid #1a2340;
            margin: 6px 0 10px;
        }
        
        .text-muted {
            color: #3a4a6a;
        }
        
        .text-center {
            text-align: center;
        }
        
        .mt-1 { margin-top: 6px; }
        .mt-2 { margin-top: 12px; }
        .mb-1 { margin-bottom: 6px; }
        .mb-2 { margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ATX Roblox Checker</h1>
            <div class="subtitle">Account verification & intelligence gathering</div>
            <div class="version">v1.0.0</div>
        </div>
        
        <div class="grid">
            <div class="card full-width">
                <div class="card-header">
                    <h3>Configuration</h3>
                    <span class="badge-count">Single or bulk</span>
                </div>
                
                <form id="configForm">
                    <div class="form-group">
                        <label>Accounts (username:password)</label>
                        <textarea id="comboContent" placeholder="username1:password1&#10;username2:password2" required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Proxies (optional)</label>
                        <textarea id="proxyContent" placeholder="http://proxy1:port&#10;http://proxy2:port" style="min-height: 60px;"></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Threads</label>
                            <input type="number" id="threads" value="1" min="1" max="10">
                        </div>
                        <div class="form-group">
                            <label>Min Delay (s)</label>
                            <input type="number" id="minDelay" value="2" min="1" step="0.5">
                        </div>
                        <div class="form-group">
                            <label>Max Delay (s)</label>
                            <input type="number" id="maxDelay" value="5" min="1" step="0.5">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Mode</label>
                        <select id="mode">
                            <option value="headless">Headless (Recommended)</option>
                            <option value="normal">Normal (Visible)</option>
                            <option value="stealth">Stealth</option>
                            <option value="rapid">Rapid</option>
                        </select>
                    </div>
                    
                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary" id="startBtn">Start Checking</button>
                        <button type="button" class="btn btn-danger" id="stopBtn" disabled>Stop</button>
                        <button type="button" class="btn btn-secondary" id="clearBtn">Clear Results</button>
                    </div>
                </form>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <h3>Status</h3>
                    <span class="badge-count" id="progressText">0 / 0</span>
                </div>
                
                <div class="status-bar">
                    <div class="status-indicator">
                        <span class="status-dot stopped" id="statusDot"></span>
                        <span class="status-text stopped" id="statusText">Stopped</span>
                    </div>
                    <span class="progress-text" id="timeText">--:--</span>
                </div>
                
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-item hit">
                        <div class="stat-value" id="hits">0</div>
                        <div class="stat-label">Valid</div>
                    </div>
                    <div class="stat-item premium">
                        <div class="stat-value" id="premium">0</div>
                        <div class="stat-label">Premium</div>
                    </div>
                    <div class="stat-item robux">
                        <div class="stat-value" id="robux">0</div>
                        <div class="stat-label">Robux</div>
                    </div>
                    <div class="stat-item high-value">
                        <div class="stat-value" id="highValue">0</div>
                        <div class="stat-label">High Value</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <h3>Results</h3>
                    <span class="badge-count" id="resultCount">0 entries</span>
                </div>
                <div class="result-box" id="resultBox">
                    <div class="result-line muted">Waiting for results...</div>
                </div>
            </div>
        </div>
        
        <div class="card full-width">
            <div class="card-header">
                <h3>Downloads</h3>
                <span class="badge-count">Result files</span>
            </div>
            <div class="file-list" id="fileList">
                <div class="text-muted" style="padding: 8px 0; font-size: 0.85em;">No files available</div>
            </div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <h3>Processing</h3>
            <p id="loadingText">Checking accounts...</p>
        </div>
    </div>

    <script>
        let updateInterval = null;
        let fileListInterval = null;
        let resultHistory = [];
        let startTime = null;
        
        function formatTime(seconds) {
            if (!seconds) return '--:--';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }
        
        function addResult(text, type = 'info') {
            const box = document.getElementById('resultBox');
            const div = document.createElement('div');
            div.className = `result-line ${type}`;
            
            // Add timestamp
            const time = new Date().toLocaleTimeString();
            div.textContent = `[${time}] ${text}`;
            
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            resultHistory.push({ text, type });
            
            // Update count
            document.getElementById('resultCount').textContent = `${resultHistory.length} entries`;
            
            // Keep only last 200 results for performance
            if (resultHistory.length > 200) {
                resultHistory.shift();
                if (box.children.length > 200) {
                    box.removeChild(box.firstChild);
                }
            }
        }
        
        function clearResults() {
            const box = document.getElementById('resultBox');
            box.innerHTML = '';
            resultHistory = [];
            document.getElementById('resultCount').textContent = '0 entries';
            addResult('Cleared. Ready for new checks.', 'muted');
        }
        
        async function loadStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                const status = data.status;
                const isRunning = data.is_running;
                
                // Update status indicators
                const dot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');
                
                if (isRunning) {
                    dot.className = 'status-dot running';
                    statusText.className = 'status-text running';
                    statusText.textContent = 'Running';
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('stopBtn').disabled = false;
                    document.getElementById('loadingOverlay').classList.add('active');
                    document.getElementById('loadingText').textContent = `Checking ${status.verified}/${status.total} accounts...`;
                } else {
                    dot.className = 'status-dot stopped';
                    statusText.className = 'status-text stopped';
                    statusText.textContent = 'Stopped';
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('stopBtn').disabled = true;
                    document.getElementById('loadingOverlay').classList.remove('active');
                }
                
                // Update stats
                document.getElementById('hits').textContent = status.valid || 0;
                document.getElementById('premium').textContent = status.premium_accounts || 0;
                document.getElementById('robux').textContent = (status.total_robux || 0).toLocaleString();
                document.getElementById('highValue').textContent = status.high_value_accounts || 0;
                
                // Update progress
                const total = status.total || 1;
                const verified = status.verified || 0;
                const progress = total > 0 ? (verified / total) * 100 : 0;
                
                document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
                document.getElementById('progressText').textContent = `${verified} / ${total}`;
                
                // Update time
                if (status.start_time) {
                    const elapsed = (Date.now() / 1000) - status.start_time;
                    document.getElementById('timeText').textContent = formatTime(elapsed);
                }
                
                // Update recent results
                const results = status.recent_results || [];
                if (results.length > 0) {
                    const existingResults = resultHistory.map(r => r.text);
                    for (const result of results) {
                        if (!existingResults.some(r => r.includes(result.substring(0, 30)))) {
                            const isHit = result.includes('[HIT]');
                            const isPremium = result.includes('PREMIUM');
                            const isWrong = result.includes('[WRONG]');
                            const isError = result.includes('[ERROR]') || result.includes('Error');
                            
                            let type = 'info';
                            if (isHit && isPremium) type = 'premium';
                            else if (isHit) type = 'hit';
                            else if (isWrong || isError) type = 'error';
                            
                            addResult(result, type);
                        }
                    }
                }
                
            } catch (error) {
                console.error('Status error:', error);
            }
        }
        
        async function loadFileList() {
            try {
                const response = await fetch('/api/files');
                const data = await response.json();
                
                const fileList = document.getElementById('fileList');
                
                if (!data.files || data.files.length === 0) {
                    fileList.innerHTML = `<div class="text-muted" style="padding: 8px 0; font-size: 0.85em;">No files available</div>`;
                    return;
                }
                
                fileList.innerHTML = data.files.map(file => {
                    const size = (file.size / 1024).toFixed(1);
                    const modified = new Date(file.modified).toLocaleString();
                    return `
                        <div class="file-item">
                            <span class="file-name">${file.name}</span>
                            <span class="file-size">${size} KB</span>
                            <a href="/api/download/${file.name}" class="btn btn-success btn-sm" download>Download</a>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('File list error:', error);
            }
        }
        
        document.getElementById('configForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const comboContent = document.getElementById('comboContent').value.trim();
            if (!comboContent) {
                addResult('Error: Please enter at least one account', 'error');
                return;
            }
            
            const lines = comboContent.split('\n').filter(line => line.trim());
            addResult(`Starting check for ${lines.length} account(s)`, 'info');
            
            const config = {
                combo_content: comboContent,
                proxy_content: document.getElementById('proxyContent').value.trim(),
                threads: parseInt(document.getElementById('threads').value) || 1,
                min_delay: parseFloat(document.getElementById('minDelay').value) || 2,
                max_delay: parseFloat(document.getElementById('maxDelay').value) || 5,
                mode: document.getElementById('mode').value
            };
            
            try {
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(config)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    addResult(`Checker started successfully (${data.total_accounts} accounts)`, 'success');
                    
                    if (updateInterval) clearInterval(updateInterval);
                    if (fileListInterval) clearInterval(fileListInterval);
                    
                    updateInterval = setInterval(loadStatus, 1500);
                    fileListInterval = setInterval(loadFileList, 5000);
                    
                    loadStatus();
                    loadFileList();
                } else {
                    addResult(`Error: ${data.error}`, 'error');
                }
            } catch (error) {
                addResult(`Error: ${error.message}`, 'error');
            }
        });
        
        document.getElementById('stopBtn').addEventListener('click', async () => {
            if (!confirm('Stop the checker?')) return;
            
            try {
                const response = await fetch('/api/stop', { method: 'POST' });
                const data = await response.json();
                
                if (response.ok) {
                    addResult('Checker stopped', 'warning');
                    loadStatus();
                } else {
                    addResult(`Error: ${data.error}`, 'error');
                }
            } catch (error) {
                addResult(`Error: ${error.message}`, 'error');
            }
        });
        
        document.getElementById('clearBtn').addEventListener('click', clearResults);
        
        // Initial load
        loadStatus();
        loadFileList();
        
        // Auto-refresh
        setInterval(loadStatus, 3000);
        setInterval(loadFileList, 10000);
        
        // Detect single combo
        document.getElementById('comboContent').addEventListener('input', function() {
            const lines = this.value.split('\n').filter(line => line.trim());
            if (lines.length === 1 && lines[0].includes(':')) {
                // Single combo detected - optional visual feedback
            }
        });
    </script>
</body>
</html>
