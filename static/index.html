<!DOCTYPE html>
<html>
<head>
    <title>ATX Roblox Checker</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; background: #0a0e1a; color: #fff; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: #141b2d; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        textarea { width: 100%; padding: 10px; background: #0a0e1a; color: #fff; border: 1px solid #1f2a42; border-radius: 4px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-start { background: #667eea; color: #fff; }
        .btn-stop { background: #dc3545; color: #fff; }
        .status { margin-top: 10px; padding: 10px; background: #0a0e1a; border-radius: 4px; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 10px 0; }
        .stat-item { background: #0a0e1a; padding: 10px; text-align: center; border-radius: 4px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #8892b0; }
        .hit { color: #4ade80; }
        .premium { color: #fbbf24; }
        .progress-bar { width: 100%; height: 6px; background: #0a0e1a; border-radius: 3px; margin: 10px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 3px; transition: width 0.5s; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ ATX Roblox Checker</h1>
        
        <div class="card">
            <h3>Configuration</h3>
            <textarea id="combo" rows="5" placeholder="username:password&#10;user2:pass2"></textarea>
            <br><br>
            <input type="number" id="threads" value="2" min="1" max="5" style="width: 60px; padding: 5px; background: #0a0e1a; color: #fff; border: 1px solid #1f2a42; border-radius: 4px;">
            <label>Threads</label>
            <br><br>
            <button class="btn-start" onclick="startChecker()">▶ Start</button>
            <button class="btn-stop" onclick="stopChecker()">⏹ Stop</button>
        </div>
        
        <div class="card">
            <h3>Status</h3>
            <div id="statusText">Stopped</div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
            <div class="stat-grid">
                <div class="stat-item"><div class="stat-value hit" id="hits">0</div><div class="stat-label">Hits</div></div>
                <div class="stat-item"><div class="stat-value premium" id="premium">0</div><div class="stat-label">Premium</div></div>
                <div class="stat-item"><div class="stat-value" id="robux">0</div><div class="stat-label">Robux</div></div>
                <div class="stat-item"><div class="stat-value" id="progress">0%</div><div class="stat-label">Progress</div></div>
            </div>
        </div>
        
        <div class="card">
            <h3>Results</h3>
            <div id="results" style="font-size: 12px; max-height: 200px; overflow-y: auto;">Waiting...</div>
        </div>
        
        <div class="card">
            <h3>Download</h3>
            <div id="files">No files</div>
        </div>
    </div>
    
    <script>
        async function startChecker() {
            const combo = document.getElementById('combo').value;
            if (!combo) { alert('Please enter combos'); return; }
            
            const data = {
                combo_content: combo,
                threads: parseInt(document.getElementById('threads').value) || 2,
                mode: 'headless',
                min_delay: 2,
                max_delay: 5
            };
            
            const response = await fetch('/api/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();
            alert(result.success ? '✅ Checker started!' : '❌ Error: ' + result.error);
            if (result.success) updateStatus();
        }
        
        async function stopChecker() {
            const response = await fetch('/api/stop', { method: 'POST' });
            const result = await response.json();
            alert(result.success ? '⏹ Checker stopped' : '❌ Error');
        }
        
        async function updateStatus() {
            const response = await fetch('/api/status');
            const data = await response.json();
            
            const s = data.status;
            document.getElementById('statusText').textContent = data.is_running ? '🟢 Running' : '🔴 Stopped';
            document.getElementById('hits').textContent = s.valid || 0;
            document.getElementById('premium').textContent = s.premium_accounts || 0;
            document.getElementById('robux').textContent = (s.total_robux || 0).toLocaleString();
            
            const progress = s.total > 0 ? Math.round((s.verified / s.total) * 100) : 0;
            document.getElementById('progress').textContent = progress + '%';
            document.getElementById('progressFill').style.width = progress + '%';
            
            // Results
            const results = s.recent_results || [];
            document.getElementById('results').innerHTML = results.length ? 
                results.map(r => `<div>${r}</div>`).join('') : 
                'No results yet';
            
            // Files
            const filesResp = await fetch('/api/files');
            const filesData = await filesResp.json();
            const files = filesData.files || [];
            document.getElementById('files').innerHTML = files.length ? 
                files.map(f => `<a href="/api/download/${f.name}" download>📄 ${f.name}</a>`).join(' | ') : 
                'No files';
        }
        
        // Auto-refresh
        setInterval(updateStatus, 3000);
        updateStatus();
    </script>
</body>
</html>
