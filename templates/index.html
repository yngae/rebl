<!-- templates/index.html - Web Interface -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Account Checker</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #1a2a3a;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #ff4444, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }
        
        header p {
            color: #666;
            margin-top: 5px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: #111827;
            border: 1px solid #1f2a3a;
            border-radius: 12px;
            padding: 20px;
        }
        
        .card h2 {
            font-size: 1.1em;
            color: #888;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .card h2 .badge {
            background: #1f2a3a;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7em;
            color: #666;
            margin-left: 10px;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            background: #0d1520;
            border: 1px solid #1f2a3a;
            border-radius: 8px;
            color: #e0e0e0;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #ff4444;
        }
        
        textarea::placeholder {
            color: #444;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #888;
            font-size: 0.9em;
        }
        
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        
        .input-row input {
            width: 100%;
            padding: 10px 12px;
            background: #0d1520;
            border: 1px solid #1f2a3a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .input-row input:focus {
            outline: none;
            border-color: #ff4444;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 68, 68, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #00cc88, #009966);
            color: white;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #ffaa00, #cc8800);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
        }
        
        .btn-secondary {
            background: #1f2a3a;
            color: #888;
        }
        
        .btn-secondary:hover {
            background: #2a3a4a;
            color: #fff;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }
        
        .stat-item {
            background: #0d1520;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-item .value {
            font-size: 1.8em;
            font-weight: 700;
            color: #fff;
        }
        
        .stat-item .label {
            font-size: 0.75em;
            color: #666;
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-item .value.green { color: #00cc88; }
        .stat-item .value.red { color: #ff4444; }
        .stat-item .value.gold { color: #ffaa00; }
        .stat-item .value.blue { color: #4488ff; }
        .stat-item .value.purple { color: #aa66ff; }
        
        /* Logs */
        .log-container {
            background: #0d1520;
            border-radius: 8px;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .log-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .log-container::-webkit-scrollbar-track {
            background: #0d1520;
        }
        
        .log-container::-webkit-scrollbar-thumb {
            background: #1f2a3a;
            border-radius: 3px;
        }
        
        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #0a0e17;
        }
        
        .log-entry .time {
            color: #444;
            margin-right: 10px;
        }
        
        .log-entry .level-success { color: #00cc88; }
        .log-entry .level-error { color: #ff4444; }
        .log-entry .level-warning { color: #ffaa00; }
        .log-entry .level-info { color: #4488ff; }
        
        /* Hits Table */
        .hits-container {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .hits-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .hits-container::-webkit-scrollbar-track {
            background: #0d1520;
        }
        
        .hits-container::-webkit-scrollbar-thumb {
            background: #1f2a3a;
            border-radius: 3px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        table th {
            text-align: left;
            padding: 10px 8px;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.7em;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #1f2a3a;
            position: sticky;
            top: 0;
            background: #111827;
        }
        
        table td {
            padding: 8px;
            border-bottom: 1px solid #0d1520;
        }
        
        table tr:hover td {
            background: #0d1520;
        }
        
        .hit-premium {
            color: #ffaa00;
            font-weight: 700;
        }
        
        .hit-robux {
            color: #00cc88;
        }
        
        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-badge.hit { background: #00cc8822; color: #00cc88; }
        .status-badge.wrong { background: #ff444422; color: #ff4444; }
        .status-badge.captcha { background: #ffaa0022; color: #ffaa00; }
        .status-badge.rate { background: #ff660022; color: #ff6600; }
        .status-badge.timeout { background: #4488ff22; color: #4488ff; }
        .status-badge.error { background: #ff444422; color: #ff4444; }
        
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        
        .status-dot.running { background: #00cc88; animation: pulse 1s infinite; }
        .status-dot.paused { background: #ffaa00; }
        .status-dot.stopped { background: #ff4444; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .status-text {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .empty-state {
            text-align: center;
            color: #444;
            padding: 40px 20px;
        }
        
        .empty-state .icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #0d1520;
            border-radius: 2px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff6b6b);
            border-radius: 2px;
            transition: width 0.5s;
            width: 0%;
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .input-row {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .controls .btn {
                width: 100%;
            }
            
            header h1 {
                font-size: 1.8em;
            }
            
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Roblox Account Checker</h1>
            <p>Web-based checker with live updates &mdash; No files saved</p>
            <div class="status-text" style="justify-content: center; margin-top: 10px;">
                <span class="status-dot stopped" id="statusDot"></span>
                <span id="statusLabel" style="color: #666;">Stopped</span>
            </div>
        </header>
        
        <div class="grid">
            <!-- Configuration Card -->
            <div class="card">
                <h2>⚙️ Configuration</h2>
                
                <div class="input-group">
                    <label>Accounts (user:pass format, one per line)</label>
                    <textarea id="comboInput" rows="8" placeholder="username1:password1&#10;username2:password2&#10;username3:password3"></textarea>
                </div>
                
                <div class="input-group">
                    <label>Proxies (optional, one per line)</label>
                    <textarea id="proxyInput" rows="4" placeholder="http://proxy1:8080&#10;http://proxy2:8080"></textarea>
                </div>
                
                <div class="input-row">
                    <div>
                        <label>Threads</label>
                        <input type="number" id="threadsInput" value="3" min="1" max="10">
                    </div>
                    <div>
                        <label>Min Delay (s)</label>
                        <input type="number" id="minDelayInput" value="5" min="1" step="0.5">
                    </div>
                    <div>
                        <label>Max Delay (s)</label>
                        <input type="number" id="maxDelayInput" value="10" min="2" step="0.5">
                    </div>
                </div>
                
                <div class="controls">
                    <button class="btn btn-primary" id="startBtn" onclick="startChecker()">▶ Start</button>
                    <button class="btn btn-warning" id="pauseBtn" onclick="togglePause()" disabled>⏸ Pause</button>
                    <button class="btn btn-danger" id="stopBtn" onclick="stopChecker()" disabled>⏹ Stop</button>
                    <button class="btn btn-secondary" onclick="clearLogs()">🗑 Clear Logs</button>
                </div>
            </div>
            
            <!-- Statistics Card -->
            <div class="card">
                <h2>📊 Statistics <span class="badge" id="progressText">0 / 0</span></h2>
                
                <div class="progress-bar">
                    <div class="fill" id="progressFill"></div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="value green" id="statHits">0</div>
                        <div class="label">Hits</div>
                    </div>
                    <div class="stat-item">
                        <div class="value gold" id="statPremium">0</div>
                        <div class="label">Premium</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="statRobux">0</div>
                        <div class="label">Robux</div>
                    </div>
                    <div class="stat-item">
                        <div class="value blue" id="statSpeed">0</div>
                        <div class="label">/min</div>
                    </div>
                    <div class="stat-item">
                        <div class="value purple" id="statRate">0%</div>
                        <div class="label">Hit Rate</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="statElapsed">0s</div>
                        <div class="label">Elapsed</div>
                    </div>
                </div>
                
                <div style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                    <div class="stat-item" style="background: #0d1520; padding: 8px;">
                        <div class="value red" id="statWrong" style="font-size: 1.2em;">0</div>
                        <div class="label">Wrong</div>
                    </div>
                    <div class="stat-item" style="background: #0d1520; padding: 8px;">
                        <div class="value" id="statCaptcha" style="font-size: 1.2em;">0</div>
                        <div class="label">Captcha</div>
                    </div>
                    <div class="stat-item" style="background: #0d1520; padding: 8px;">
                        <div class="value" id="statRateLimit" style="font-size: 1.2em;">0</div>
                        <div class="label">Rate Limit</div>
                    </div>
                    <div class="stat-item" style="background: #0d1520; padding: 8px;">
                        <div class="value" id="statTimeout" style="font-size: 1.2em;">0</div>
                        <div class="label">Timeout</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="grid">
            <!-- Logs Card -->
            <div class="card">
                <h2>📝 Live Logs</h2>
                <div class="log-container" id="logContainer">
                    <div class="empty-state">
                        <div class="icon">📡</div>
                        <p>Waiting for activity...</p>
                    </div>
                </div>
            </div>
            
            <!-- Hits Card -->
            <div class="card">
                <h2>🎯 Hits <span class="badge" id="hitCount">0</span></h2>
                <div class="hits-container" id="hitsContainer">
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <p>No hits yet</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Socket connection
        const socket = io();
        let isRunning = false;
        let isPaused = false;
        
        // DOM references
        const logContainer = document.getElementById('logContainer');
        const hitsContainer = document.getElementById('hitsContainer');
        
        // Status indicators
        const statusDot = document.getElementById('statusDot');
        const statusLabel = document.getElementById('statusLabel');
        
        // Stats elements
        const statHits = document.getElementById('statHits');
        const statPremium = document.getElementById('statPremium');
        const statRobux = document.getElementById('statRobux');
        const statSpeed = document.getElementById('statSpeed');
        const statRate = document.getElementById('statRate');
        const statElapsed = document.getElementById('statElapsed');
        const statWrong = document.getElementById('statWrong');
        const statCaptcha = document.getElementById('statCaptcha');
        const statRateLimit = document.getElementById('statRateLimit');
        const statTimeout = document.getElementById('statTimeout');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const hitCount = document.getElementById('hitCount');
        
        // Buttons
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        
        // Socket events
        socket.on('connect', () => {
            addLog('Connected to server', 'info');
        });
        
        socket.on('log', (data) => {
            addLog(data.message, data.level);
        });
        
        socket.on('update', (data) => {
            // Update recent results if needed
        });
        
        socket.on('progress', (data) => {
            updateStats(data);
        });
        
        socket.on('complete', (data) => {
            addLog('✅ ' + data.message, 'success');
            setStatus('stopped');
            isRunning = false;
            updateButtons();
        });
        
        // Functions
        function addLog(message, level = 'info') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="time">[${time}]</span><span class="level-${level}">${message}</span>`;
            
            // Remove empty state if present
            const emptyState = logContainer.querySelector('.empty-state');
            if (emptyState) emptyState.remove();
            
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
            
            // Keep only last 200 entries
            while (logContainer.children.length > 200) {
                logContainer.removeChild(logContainer.firstChild);
            }
        }
        
        function addHit(hit) {
            // Remove empty state if present
            const emptyState = hitsContainer.querySelector('.empty-state');
            if (emptyState) emptyState.remove();
            
            const row = document.createElement('tr');
            const premium = hit.premium ? '👑' : '';
            const robux = hit.robux > 0 ? `R$${hit.robux.toLocaleString()}` : '-';
            
            row.innerHTML = `
                <td><strong>${hit.username}</strong></td>
                <td>${hit.password}</td>
                <td class="hit-robux">${robux}</td>
                <td class="hit-premium">${premium}</td>
                <td style="font-size: 0.8em; color: #666;">${hit.time || ''}</td>
            `;
            
            hitsContainer.querySelector('table')?.appendChild(row);
            
            // Update hit count
            hitCount.textContent = hitsContainer.querySelectorAll('tr').length;
        }
        
        function updateStats(data) {
            statHits.textContent = data.valid || 0;
            statPremium.textContent = data.premium || 0;
            statRobux.textContent = (data.robux || 0).toLocaleString();
            statSpeed.textContent = data.speed || 0;
            statRate.textContent = (data.hit_rate || 0) + '%';
            
            const elapsed = data.elapsed || 0;
            if (elapsed < 60) {
                statElapsed.textContent = Math.floor(elapsed) + 's';
            } else {
                const mins = Math.floor(elapsed / 60);
                const secs = Math.floor(elapsed % 60);
                statElapsed.textContent = mins + 'm ' + secs + 's';
            }
            
            const progress = data.total > 0 ? (data.verified / data.total * 100) : 0;
            progressFill.style.width = Math.min(progress, 100) + '%';
            progressText.textContent = `${data.verified || 0} / ${data.total || 0}`;
        }
        
        function setStatus(status) {
            statusDot.className = 'status-dot ' + status;
            const labels = {
                'running': 'Running',
                'paused': 'Paused',
                'stopped': 'Stopped'
            };
            statusLabel.textContent = labels[status] || 'Stopped';
        }
        
        function updateButtons() {
            startBtn.disabled = isRunning;
            pauseBtn.disabled = !isRunning || isPaused;
            pauseBtn.textContent = isPaused ? '▶ Resume' : '⏸ Pause';
            stopBtn.disabled = !isRunning;
        }
        
        async function startChecker() {
            const combo = document.getElementById('comboInput').value.trim();
            if (!combo) {
                alert('Please enter at least one account (user:pass)');
                return;
            }
            
            const data = {
                combo: combo,
                proxies: document.getElementById('proxyInput').value.trim(),
                threads: parseInt(document.getElementById('threadsInput').value) || 3,
                min_delay: parseFloat(document.getElementById('minDelayInput').value) || 5,
                max_delay: parseFloat(document.getElementById('maxDelayInput').value) || 10
            };
            
            try {
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.error) {
                    alert('Error: ' + result.error);
                    return;
                }
                
                isRunning = true;
                isPaused = false;
                setStatus('running');
                updateButtons();
                addLog('🚀 Checker started with ' + result.total + ' accounts', 'success');
                
            } catch (error) {
                alert('Error starting checker: ' + error.message);
            }
        }
        
        async function togglePause() {
            try {
                if (isPaused) {
                    await fetch('/api/resume', { method: 'POST' });
                    isPaused = false;
                    setStatus('running');
                    addLog('▶ Resumed', 'info');
                } else {
                    await fetch('/api/pause', { method: 'POST' });
                    isPaused = true;
                    setStatus('paused');
                    addLog('⏸ Paused', 'warning');
                }
                updateButtons();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function stopChecker() {
            if (!confirm('Stop the checker?')) return;
            
            try {
                await fetch('/api/stop', { method: 'POST' });
                isRunning = false;
                isPaused = false;
                setStatus('stopped');
                updateButtons();
                addLog('⏹ Checker stopped', 'warning');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        function clearLogs() {
            logContainer.innerHTML = `
                <div class="empty-state">
                    <div class="icon">📡</div>
                    <p>Logs cleared</p>
                </div>
            `;
        }
        
        // Initial fetch of hits
        async function fetchHits() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                if (data.hits && data.hits.length > 0) {
                    data.hits.forEach(hit => addHit(hit));
                }
                
                if (data.stats) {
                    updateStats(data.stats);
                }
            } catch (error) {
                console.error('Error fetching status:', error);
            }
        }
        
        // Initial load
        fetchHits();
        
        // Update buttons initially
        updateButtons();
        
        // Auto-refresh status every 3 seconds
        setInterval(fetchHits, 3000);
    </script>
</body>
</html>
