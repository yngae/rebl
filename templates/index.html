<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Account Checker</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #1a1a2e;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #888;
            font-size: 1rem;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: #12121f;
            border: 1px solid #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.3s;
        }
        
        .card:hover {
            border-color: #2a2a4e;
        }
        
        .card h3 {
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        
        .card textarea {
            width: 100%;
            height: 200px;
            background: #0a0a12;
            border: 1px solid #1a1a2e;
            border-radius: 8px;
            color: #e0e0e0;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            resize: vertical;
        }
        
        .card textarea:focus {
            outline: none;
            border-color: #7b2ffc;
        }
        
        .card input[type="number"] {
            width: 100%;
            padding: 10px;
            background: #0a0a12;
            border: 1px solid #1a1a2e;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 1rem;
        }
        
        .card input[type="number"]:focus {
            outline: none;
            border-color: #7b2ffc;
        }
        
        .control-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 100px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(123, 47, 252, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .btn-warning {
            background: #ffc107;
            color: #000;
        }
        
        .btn-warning:hover {
            background: #e0a800;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .btn-secondary {
            background: #1a1a2e;
            color: #e0e0e0;
        }
        
        .btn-secondary:hover {
            background: #2a2a4e;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin: 15px 0;
        }
        
        .stat-box {
            background: #0a0a12;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-box .number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00d4ff;
        }
        
        .stat-box .label {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }
        
        .stat-box.hit .number {
            color: #28a745;
        }
        
        .stat-box.premium .number {
            color: #ffc107;
        }
        
        .stat-box.robux .number {
            color: #ff6b6b;
        }
        
        .log-container {
            background: #0a0a12;
            border-radius: 8px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            border: 1px solid #1a1a2e;
        }
        
        .log-container::-webkit-scrollbar {
            width: 8px;
        }
        
        .log-container::-webkit-scrollbar-track {
            background: #0a0a12;
        }
        
        .log-container::-webkit-scrollbar-thumb {
            background: #2a2a4e;
            border-radius: 4px;
        }
        
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #0a0a12;
        }
        
        .log-entry .time {
            color: #666;
            margin-right: 10px;
        }
        
        .log-entry.success {
            color: #28a745;
        }
        
        .log-entry.error {
            color: #dc3545;
        }
        
        .log-entry.warning {
            color: #ffc107;
        }
        
        .log-entry.info {
            color: #00d4ff;
        }
        
        .hits-container {
            background: #0a0a12;
            border-radius: 8px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            border: 1px solid #1a1a2e;
        }
        
        .hit-item {
            padding: 10px;
            border-bottom: 1px solid #1a1a2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .hit-item .username {
            font-weight: 600;
            color: #00d4ff;
        }
        
        .hit-item .robux {
            color: #ff6b6b;
            font-weight: 600;
        }
        
        .hit-item .premium {
            color: #ffc107;
            font-size: 0.8rem;
            background: #1a1a2e;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }
        
        .status-indicator.running {
            background: #28a745;
            animation: pulse 1s infinite;
        }
        
        .status-indicator.paused {
            background: #ffc107;
        }
        
        .status-indicator.stopped {
            background: #dc3545;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .status-text {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: #0a0a12;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .current-account {
            color: #888;
            font-size: 0.9rem;
        }
        
        .current-account span {
            color: #e0e0e0;
            font-weight: 600;
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .btn {
                min-width: 80px;
                padding: 10px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Roblox Account Checker</h1>
            <p>Powered by AntraxRblxChecker Engine</p>
        </div>

        <div class="status-text">
            <span class="status-indicator stopped" id="statusIndicator"></span>
            <span id="statusLabel">Stopped</span>
            <span style="margin-left: auto;" class="current-account">
                Current: <span id="currentAccount">-</span>
            </span>
        </div>

        <div class="grid">
            <div class="card">
                <h3>📋 Accounts (user:pass)</h3>
                <textarea id="comboInput" placeholder="username1:password1&#10;username2:password2&#10;username3:password3"></textarea>
            </div>

            <div class="card">
                <h3>🌐 Proxies (optional)</h3>
                <textarea id="proxyInput" placeholder="http://proxy1:port&#10;http://proxy2:port&#10;http://proxy3:port"></textarea>
            </div>

            <div class="card">
                <h3>⚙️ Settings</h3>
                <div style="display: grid; gap: 15px;">
                    <div>
                        <label style="display: block; color: #888; margin-bottom: 5px; font-size: 0.9rem;">Threads</label>
                        <input type="number" id="threadsInput" value="3" min="1" max="5">
                    </div>
                    <div>
                        <label style="display: block; color: #888; margin-bottom: 5px; font-size: 0.9rem;">Min Delay (seconds)</label>
                        <input type="number" id="minDelay" value="5" min="1" step="0.5">
                    </div>
                    <div>
                        <label style="display: block; color: #888; margin-bottom: 5px; font-size: 0.9rem;">Max Delay (seconds)</label>
                        <input type="number" id="maxDelay" value="10" min="1" step="0.5">
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>🎯 Controls</h3>
                <div class="control-group">
                    <button class="btn btn-primary" id="startBtn" onclick="startChecker()">▶ Start</button>
                    <button class="btn btn-warning" id="pauseBtn" onclick="pauseChecker()" disabled>⏸ Pause</button>
                    <button class="btn btn-success" id="resumeBtn" onclick="resumeChecker()" disabled>▶ Resume</button>
                    <button class="btn btn-danger" id="stopBtn" onclick="stopChecker()" disabled>⏹ Stop</button>
                </div>
                <div class="control-group" style="margin-top: 10px;">
                    <button class="btn btn-secondary" onclick="clearResults()">🧹 Clear Results</button>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="card full-width">
                <h3>📊 Statistics</h3>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="number" id="totalAccounts">0</div>
                        <div class="label">Total</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="verifiedAccounts">0</div>
                        <div class="label">Verified</div>
                    </div>
                    <div class="stat-box hit">
                        <div class="number" id="validAccounts">0</div>
                        <div class="label">Hits</div>
                    </div>
                    <div class="stat-box premium">
                        <div class="number" id="premiumAccounts">0</div>
                        <div class="label">Premium</div>
                    </div>
                    <div class="stat-box robux">
                        <div class="number" id="totalRobux">0</div>
                        <div class="label">Total Robux</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="speedStats">0</div>
                        <div class="label">Speed/min</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>📝 Logs</h3>
                <div class="log-container" id="logContainer"></div>
            </div>

            <div class="card">
                <h3>🏆 Hits</h3>
                <div class="hits-container" id="hitsContainer">
                    <div style="color: #666; text-align: center; padding: 40px 0;">No hits yet</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // SOCKETIO CONNECTION - FIXED to prevent loop
        // ============================================================
        let socket = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 3;

        function initSocket() {
            if (socket && socket.connected) {
                return;
            }

            socket = io({
                // Don't auto reconnect - we'll handle it manually
                reconnection: false,
                transports: ['websocket', 'polling'],
                timeout: 10000
            });

            socket.on('connect', () => {
                console.log('[SOCKET] Connected');
                reconnectAttempts = 0;
                addLog('📡 Connected to server', 'info');
            });

            socket.on('disconnect', () => {
                console.log('[SOCKET] Disconnected');
                // Don't auto reconnect - just log it
            });

            socket.on('connect_error', (error) => {
                console.log('[SOCKET] Connection error:', error);
                // Try to reconnect manually if we haven't tried too many times
                if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                    reconnectAttempts++;
                    console.log(`[SOCKET] Reconnect attempt ${reconnectAttempts}`);
                    setTimeout(() => {
                        if (socket) {
                            socket.connect();
                        }
                    }, 2000);
                } else {
                    addLog('⚠️ Could not connect to server. Please refresh.', 'warning');
                }
            });

            // Event handlers
            socket.on('connected', (data) => {
                console.log('[SOCKET] Connected event received');
                updateStatus('stopped');
            });

            socket.on('log', (data) => {
                addLog(data.message, data.level);
            });

            socket.on('update', (data) => {
                if (data.username) {
                    document.getElementById('currentAccount').textContent = data.username;
                }
            });

            socket.on('progress', (data) => {
                document.getElementById('verifiedAccounts').textContent = data.verified || 0;
                document.getElementById('validAccounts').textContent = data.valid || 0;
                document.getElementById('premiumAccounts').textContent = data.premium || 0;
                document.getElementById('totalRobux').textContent = data.robux || 0;
                document.getElementById('speedStats').textContent = data.speed || 0;
                
                if (data.verified >= data.total && data.total > 0) {
                    updateStatus('stopped');
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('pauseBtn').disabled = true;
                    document.getElementById('resumeBtn').disabled = true;
                    document.getElementById('stopBtn').disabled = true;
                }
            });

            socket.on('hit', (data) => {
                addHit(data);
                updateStats();
            });

            socket.on('complete', (data) => {
                addLog('✅ ' + data.message, 'success');
                updateStatus('stopped');
                document.getElementById('startBtn').disabled = false;
                document.getElementById('pauseBtn').disabled = true;
                document.getElementById('resumeBtn').disabled = true;
                document.getElementById('stopBtn').disabled = true;
            });
        }

        // Initialize socket on page load
        initSocket();

        // ============================================================
        // FUNCTIONS
        // ============================================================
        function updateStatus(status) {
            const indicator = document.getElementById('statusIndicator');
            const label = document.getElementById('statusLabel');
            
            indicator.className = 'status-indicator';
            if (status === 'running') {
                indicator.classList.add('running');
                label.textContent = 'Running';
            } else if (status === 'paused') {
                indicator.classList.add('paused');
                label.textContent = 'Paused';
            } else {
                indicator.classList.add('stopped');
                label.textContent = 'Stopped';
            }
        }

        function addLog(message, level = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${level}`;
            
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="time">[${time}]</span>${message}`;
            
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            
            while (container.children.length > 500) {
                container.removeChild(container.firstChild);
            }
        }

        function addHit(data) {
            const container = document.getElementById('hitsContainer');
            
            const noHits = container.querySelector('div[style]');
            if (noHits) {
                container.innerHTML = '';
            }
            
            const hit = document.createElement('div');
            hit.className = 'hit-item';
            hit.innerHTML = `
                <div>
                    <span class="username">${data.username}</span>
                    ${data.premium ? '<span class="premium">⭐ PREMIUM</span>' : ''}
                </div>
                <div>
                    <span class="robux">💰 ${data.robux || 0} R$</span>
                    <span style="color: #666; font-size: 0.8rem; margin-left: 10px;">${data.time || ''}</span>
                </div>
            `;
            
            container.insertBefore(hit, container.firstChild);
            
            while (container.children.length > 100) {
                container.removeChild(container.lastChild);
            }
        }

        async function updateStats() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                if (data.stats) {
                    document.getElementById('totalAccounts').textContent = data.stats.total || 0;
                    document.getElementById('verifiedAccounts').textContent = data.stats.verified || 0;
                    document.getElementById('validAccounts').textContent = data.stats.valid || 0;
                    document.getElementById('premiumAccounts').textContent = data.stats.premium_accounts || 0;
                    document.getElementById('totalRobux').textContent = data.stats.total_robux || 0;
                }
                
                if (data.running) {
                    updateStatus(data.paused ? 'paused' : 'running');
                }
                
                if (data.hits && data.hits.length > 0) {
                    const container = document.getElementById('hitsContainer');
                    const noHits = container.querySelector('div[style]');
                    if (noHits) {
                        container.innerHTML = '';
                    }
                    
                    data.hits.slice().reverse().forEach(hit => {
                        const hitEl = document.createElement('div');
                        hitEl.className = 'hit-item';
                        hitEl.innerHTML = `
                            <div>
                                <span class="username">${hit.username}</span>
                                ${hit.premium ? '<span class="premium">⭐ PREMIUM</span>' : ''}
                            </div>
                            <div>
                                <span class="robux">💰 ${hit.robux || 0} R$</span>
                                <span style="color: #666; font-size: 0.8rem; margin-left: 10px;">${hit.time || ''}</span>
                            </div>
                        `;
                        container.appendChild(hitEl);
                    });
                }
            } catch (error) {
                console.error('Failed to update stats:', error);
            }
        }

        async function startChecker() {
            const combo = document.getElementById('comboInput').value;
            const proxies = document.getElementById('proxyInput').value;
            const threads = parseInt(document.getElementById('threadsInput').value) || 3;
            const minDelay = parseFloat(document.getElementById('minDelay').value) || 5;
            const maxDelay = parseFloat(document.getElementById('maxDelay').value) || 10;

            if (!combo.trim()) {
                alert('Please enter at least one account (format: username:password)');
                return;
            }

            try {
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        combo: combo,
                        proxies: proxies,
                        threads: threads,
                        min_delay: minDelay,
                        max_delay: maxDelay
                    })
                });

                const data = await response.json();

                if (data.error) {
                    alert('Error: ' + data.error);
                    return;
                }

                document.getElementById('totalAccounts').textContent = data.total || 0;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = false;
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('resumeBtn').disabled = true;
                
                updateStatus('running');
                addLog(`🚀 Started checker with ${data.total || 0} accounts`, 'success');

            } catch (error) {
                console.error('Start error:', error);
                alert('Failed to start checker');
            }
        }

        async function pauseChecker() {
            try {
                await fetch('/api/pause', { method: 'POST' });
                document.getElementById('pauseBtn').disabled = true;
                document.getElementById('resumeBtn').disabled = false;
                updateStatus('paused');
                addLog('⏸ Checker paused', 'warning');
            } catch (error) {
                console.error('Pause error:', error);
            }
        }

        async function resumeChecker() {
            try {
                await fetch('/api/resume', { method: 'POST' });
                document.getElementById('pauseBtn').disabled = false;
                document.getElementById('resumeBtn').disabled = true;
                updateStatus('running');
                addLog('▶ Checker resumed', 'info');
            } catch (error) {
                console.error('Resume error:', error);
            }
        }

        async function stopChecker() {
            try {
                await fetch('/api/stop', { method: 'POST' });
                document.getElementById('startBtn').disabled = false;
                document.getElementById('pauseBtn').disabled = true;
                document.getElementById('resumeBtn').disabled = true;
                document.getElementById('stopBtn').disabled = true;
                updateStatus('stopped');
                addLog('⏹ Checker stopped', 'warning');
            } catch (error) {
                console.error('Stop error:', error);
            }
        }

        async function clearResults() {
            try {
                await fetch('/api/clear', { method: 'POST' });
                document.getElementById('hitsContainer').innerHTML = '<div style="color: #666; text-align: center; padding: 40px 0;">No hits yet</div>';
                document.getElementById('logContainer').innerHTML = '';
                addLog('🧹 Results cleared', 'info');
            } catch (error) {
                console.error('Clear error:', error);
            }
        }

        // ============================================================
        // INITIALIZATION
        // ============================================================
        setInterval(updateStats, 3000);
        updateStats();
        addLog('🎮 Welcome to Roblox Account Checker', 'info');
        addLog('💡 Enter accounts and click Start', 'info');

        console.log('[APP] Initialized successfully');
    </script>
</body>
</html>
